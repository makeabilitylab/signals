# Conda environment for the makeabilitylab/signals notebooks.
#
#   conda env create -f environment.yml
#   conda activate signals
#
# Prefer this on machines that already use conda/Miniforge. Otherwise the
# venv + requirements.txt path (see README) needs no conda install.
name: signals
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy=2.4.*
  - scipy=1.18.*
  - matplotlib=3.11.*
  - pandas=3.0.*
  - scikit-learn=1.9.*
  - seaborn=0.13.*
  - librosa=0.11.*
  - jupyterlab=4.6.*
  - notebook=7.6.*
  - ipykernel=7.3.*
  - ipympl=0.10.*
  - ipywidgets=8.1.*   # interactive sliders (@interact); also a transitive dep of ipympl
  - pip
  # Install the local makelab + gesturerec helper packages (pyproject.toml)
  - pip:
      - -e .
